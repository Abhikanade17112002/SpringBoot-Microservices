server:
  port: 8081

spring:
  application:
    name: HOTEL-SERVICE

  datasource:
    url: jdbc:mysql://localhost:3306/hotelservice?useSSL=false&serverTimezone=UTC
    username: root
    password: Pass@123
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true
    open-in-view: false

    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
      # Register service in Eureka using IP address instead of hostname
      #
      # Without this:
      # Eureka may register:
      # DESKTOP-ABC123:8081
      #
      # With this:
      # Eureka registers:
      # 192.168.1.106:8081
      #
      # Useful when:
      # - Multiple microservices communicate
      # - Running on different systems
      # - Using Docker/Kubernetes/Cloud
      # - Hostname is not resolvable
      #
      # Prevents:
      # - UnknownHostException
      # - Service communication failures
      #
      # Service calls still happen using:
      # http://USER-SERVICE/...
      #
      # Eureka internally maps service name → actual IP
  instance:
    prefer-ip-address: true
management:
  endpoints:
    web:
      exposure:
        include: health,info
  info:
    env:
      enabled: true

info:
  app:
    name: HOTEL-SERVICE
    description: Hotel Service API
    version: 1.0